name: Research AI CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
        
    - name: Run Tests
      working-directory: ./backend
      run: |
        # Pytest will look for tests in backend/tests
        pytest tests/ --doctest-modules --junitxml=junit/test-results.xml

  build-images:
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Backend Image
      run: docker build ./backend -t research-ai-backend:test
      
    - name: Build Frontend Image
      run: docker build ./frontend -t research-ai-frontend:test
